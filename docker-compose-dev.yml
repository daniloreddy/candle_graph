services:
  candle-graph:
    build: .
    container_name: candle-graph-dev
    restart: "no"
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - PORT=${PORT:-8000}
      - ENV_FILE=/app/hostcfg/.env
      - NICEGUI_STORAGE_PATH=/app/data/.nicegui
    volumes:
      - .:/app/hostcfg
      - ./data:/app/data
