services:
  candle-graph:
    image: ghcr.io/daniloreddy/candle_graph:latest
    container_name: candle-graph
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-127.0.0.1}:${PORT:-8000}:${PORT:-8000}"  # BIND_HOST=0.0.0.0 per LAN / reverse proxy / esposizione diretta
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - PORT=${PORT:-8000}
      - ENV_FILE=/app/hostcfg/.env
      - NICEGUI_STORAGE_PATH=/app/data/.nicegui
    volumes:
      - .:/app/hostcfg
      - ./data:/app/data
