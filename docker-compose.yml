services:
  candle-graph:
    image: ghcr.io/daniloreddy/candle_graph:latest
    container_name: candle-graph
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
      - ENV_FILE=/app/hostcfg/.env
      - NICEGUI_STORAGE_PATH=/app/data/.nicegui
    volumes:
      - .:/app/hostcfg
      - ./data:/app/data
