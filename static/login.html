<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candle Graph · Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #121212;
    color: #E0E0E0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #1E1E1E;
    border: 1px solid #2A2A2A;
    border-radius: 8px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }
  h1 { font-size: 1.2rem; color: #E0E0E0; margin-bottom: 0.2rem; }
  .sub { font-size: 0.8rem; color: #616161; margin-bottom: 1.8rem; }
  label {
    display: block;
    font-size: 0.72rem;
    color: #616161;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 0.4rem;
  }
  input[type=password] {
    width: 100%;
    background: #121212;
    border: 1px solid #2A2A2A;
    border-radius: 4px;
    color: #E0E0E0;
    padding: 0.65rem 0.85rem;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .15s;
  }
  input[type=password]:focus { border-color: #90CAF9; }
  button {
    width: 100%;
    margin-top: 1.3rem;
    padding: 0.72rem;
    background: #90CAF9;
    color: #121212;
    border: none;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background .15s;
  }
  button:hover { background: #BBDEFB; }
  button:disabled { background: #424242; color: #757575; cursor: not-allowed; }
  .err {
    margin-top: 0.9rem;
    font-size: 0.83rem;
    color: #EF9A9A;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <h1>Candle Graph</h1>
  <p class="sub">Dashboard · Accesso richiesto</p>
  <label for="pwd">Password</label>
  <input type="password" id="pwd" placeholder="••••••••" autofocus>
  <button id="btn" onclick="login()">Accedi</button>
  <div class="err" id="err"></div>
</div>
<script>
  document.getElementById('pwd').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pwd = document.getElementById('pwd').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = '…';
    try {
      const fd = new FormData();
      fd.append('password', pwd);
      const res = await fetch('/auth/login', { method: 'POST', body: fd });
      if (res.ok) {
        window.location.href = '/ui/';
      } else {
        const data = await res.json().catch(() => ({}));
        err.textContent = data.detail || 'Errore di autenticazione';
        err.style.display = 'block';
      }
    } finally {
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  }
</script>
</body>
</html>
